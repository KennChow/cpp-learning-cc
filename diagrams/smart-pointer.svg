<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 380" width="700" height="380">
  <defs>
    <!-- Arrow: blue (unique_ptr) -->
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto">
      <path d="M1,1 L8,4 L1,7 Z" fill="#3b82f6"/>
    </marker>
    <!-- Arrow: green (shared_ptr) -->
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto">
      <path d="M1,1 L8,4 L1,7 Z" fill="#22c55e"/>
    </marker>
    <!-- Arrow: amber (weak_ptr, dashed) -->
    <marker id="arrowAmber" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto">
      <path d="M1,1 L8,4 L1,7 Z" fill="#f59e0b"/>
    </marker>
    <!-- Arrow: red (cycle) -->
    <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto">
      <path d="M1,1 L8,4 L1,7 Z" fill="#dc2626"/>
    </marker>
    <!-- Arrow: red for reverse -->
    <marker id="arrowRedRev" markerWidth="10" markerHeight="10" refX="2" refY="4" orient="auto">
      <path d="M9,1 L2,4 L9,7 Z" fill="#dc2626"/>
    </marker>
    <!-- Arrow: slate (weak_ptr to control block) -->
    <marker id="arrowSlate" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto">
      <path d="M1,1 L8,4 L1,7 Z" fill="#64748b"/>
    </marker>
    <!-- Arrow: dark (control → resource) -->
    <marker id="arrowDark" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto">
      <path d="M1,1 L8,4 L1,7 Z" fill="#1e293b"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="700" height="380" fill="#f8fafc" rx="8"/>

  <!-- ======================================================== -->
  <!-- Title -->
  <!-- ======================================================== -->
  <text x="350" y="26" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="17" font-weight="bold" fill="#1e293b">智能指针所有权模型</text>

  <!-- ======================================================== -->
  <!-- ZONE 1: unique_ptr -->
  <!-- ======================================================== -->
  <rect x="12" y="36" width="676" height="88" rx="8" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>

  <!-- Zone title -->
  <text x="22" y="56" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="bold" fill="#3b82f6">unique_ptr&lt;T&gt;</text>
  <text x="168" y="56" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#64748b">独占所有权 — 同一时刻只有一个 owner</text>

  <!-- unique_ptr box -->
  <rect x="22" y="62" width="100" height="38" rx="5" fill="#3b82f6" stroke="#1d4ed8" stroke-width="1.5"/>
  <text x="72" y="79" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="bold" fill="#fff">unique_ptr</text>
  <text x="72" y="94" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#bfdbfe">ptr_ (raw pointer)</text>

  <!-- Arrow → resource -->
  <line x1="122" y1="81" x2="195" y2="81" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- Resource box -->
  <rect x="197" y="62" width="90" height="38" rx="5" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="242" y="78" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#f8fafc">资源对象</text>
  <text x="242" y="93" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#94a3b8">T instance</text>

  <!-- Note: auto release -->
  <text x="300" y="73" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#1d4ed8">unique_ptr 销毁时，</text>
  <text x="300" y="88" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#1d4ed8">资源自动释放（析构）</text>

  <!-- Cannot copy label -->
  <rect x="490" y="58" width="90" height="44" rx="5" fill="#fee2e2" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="535" y="76" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="20" fill="#dc2626">✕</text>
  <text x="535" y="94" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#dc2626">不可拷贝</text>

  <!-- Move allowed -->
  <rect x="588" y="58" width="90" height="44" rx="5" fill="#dcfce7" stroke="#86efac" stroke-width="1.5"/>
  <text x="633" y="76" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="20" fill="#16a34a">✓</text>
  <text x="633" y="94" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#16a34a">可移动(move)</text>

  <!-- ======================================================== -->
  <!-- ZONE 2: shared_ptr -->
  <!-- ======================================================== -->
  <rect x="12" y="132" width="676" height="106" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>

  <text x="22" y="151" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="bold" fill="#22c55e">shared_ptr&lt;T&gt;</text>
  <text x="168" y="151" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#64748b">共享所有权 — 引用计数管理生命周期</text>

  <!-- sp1 -->
  <rect x="22" y="157" width="60" height="34" rx="4" fill="#22c55e" stroke="#16a34a" stroke-width="1.5"/>
  <text x="52" y="172" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="bold" fill="#fff">sp1</text>
  <text x="52" y="185" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#dcfce7">ptr_</text>

  <!-- sp2 -->
  <rect x="22" y="197" width="60" height="34" rx="4" fill="#22c55e" stroke="#16a34a" stroke-width="1.5"/>
  <text x="52" y="212" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="bold" fill="#fff">sp2</text>
  <text x="52" y="225" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#dcfce7">ptr_</text>

  <!-- sp3 -->
  <rect x="22" y="154" width="60" height="34" rx="4" fill="none" stroke="none"/>
  <!-- (already drawn sp1 at 157, let's adjust) -->

  <!-- Arrows from sp1, sp2 → control block -->
  <line x1="82" y1="174" x2="162" y2="192" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <line x1="82" y1="214" x2="162" y2="205" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <!-- sp3 box -->
  <rect x="22" y="196" width="60" height="34" rx="4" fill="none" stroke="none"/>
  <!-- Shift sp2/sp3 positions for clarity — let me re-layout -->
  <!-- Actually I'll place sp1/sp2/sp3 stacked vertically -->

  <!-- Control block -->
  <rect x="164" y="157" width="130" height="78" rx="5" fill="#faf5ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="229" y="173" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="bold" fill="#7c3aed">控制块</text>
  <rect x="172" y="177" width="114" height="22" rx="3" fill="#ede9fe"/>
  <text x="229" y="191" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#5b21b6">ref_count = 3</text>
  <rect x="172" y="201" width="114" height="22" rx="3" fill="#f3e8ff"/>
  <text x="229" y="215" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#7c3aed">weak_count = 1</text>
  <text x="229" y="230" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#6d28d9">ptr → 资源</text>

  <!-- Arrow: control block → resource -->
  <line x1="294" y1="196" x2="358" y2="196" stroke="#1e293b" stroke-width="2" marker-end="url(#arrowDark)"/>

  <!-- Resource box -->
  <rect x="360" y="157" width="86" height="78" rx="5" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="403" y="196" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#f8fafc">资源对象</text>
  <text x="403" y="212" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#94a3b8">T instance</text>

  <!-- weak_ptr box -->
  <rect x="164" y="246" width="100" height="30" rx="5" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="214" y="260" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="bold" fill="#b45309">weak_ptr</text>
  <text x="214" y="272" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#92400e">wp (虚线=不持有)</text>

  <!-- weak_ptr dashed arrow → control block -->
  <line x1="214" y1="246" x2="214" y2="236" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowAmber)"/>

  <!-- Notes -->
  <text x="460" y="172" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#15803d">ref_count 降至 0 → 资源释放</text>
  <text x="460" y="188" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#7c3aed">weak_count 降至 0 → 控制块释放</text>
  <text x="460" y="204" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#f59e0b">weak_ptr 不增加 ref_count</text>
  <text x="460" y="220" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#64748b">（需 lock() 升级为 shared_ptr 才能访问）</text>

  <!-- ======================================================== -->
  <!-- ZONE 3: Circular reference problem -->
  <!-- ======================================================== -->
  <rect x="12" y="246" width="676" height="126" rx="8" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5"/>

  <text x="22" y="265" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="bold" fill="#ea580c">循环引用问题 &amp; weak_ptr 解决方案</text>

  <!-- ---- Problem side ---- -->
  <text x="22" y="284" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#dc2626" font-weight="bold">问题：</text>

  <!-- Node A -->
  <rect x="22" y="289" width="72" height="40" rx="5" fill="#fecaca" stroke="#dc2626" stroke-width="1.5"/>
  <text x="58" y="305" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="bold" fill="#991b1b">Node A</text>
  <text x="58" y="320" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#b91c1c">shared_ptr b</text>

  <!-- Node B -->
  <rect x="134" y="289" width="72" height="40" rx="5" fill="#fecaca" stroke="#dc2626" stroke-width="1.5"/>
  <text x="170" y="305" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="bold" fill="#991b1b">Node B</text>
  <text x="170" y="320" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#b91c1c">shared_ptr a</text>

  <!-- Bidirectional red arrows -->
  <line x1="94" y1="303" x2="132" y2="303" stroke="#dc2626" stroke-width="2" marker-end="url(#arrowRed)"/>
  <line x1="134" y1="315" x2="96" y2="315" stroke="#dc2626" stroke-width="2" marker-end="url(#arrowRed)"/>

  <!-- Leak label -->
  <rect x="212" y="294" width="90" height="30" rx="4" fill="#fee2e2" stroke="#fca5a5" stroke-width="1"/>
  <text x="257" y="308" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="bold" fill="#dc2626">内存泄漏！</text>
  <text x="257" y="320" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#b91c1c">ref_count 永不为 0</text>

  <!-- ---- Solution side ---- -->
  <text x="320" y="284" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#16a34a" font-weight="bold">解决：</text>

  <!-- Node A (solution) -->
  <rect x="320" y="289" width="80" height="40" rx="5" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="360" y="305" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="bold" fill="#14532d">Node A</text>
  <text x="360" y="320" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#166534">shared_ptr b</text>

  <!-- Node B (solution) -->
  <rect x="444" y="289" width="80" height="40" rx="5" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="484" y="305" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="bold" fill="#14532d">Node B</text>
  <text x="484" y="320" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#b45309">weak_ptr a ←改</text>

  <!-- A→B solid (shared_ptr) -->
  <line x1="400" y1="303" x2="442" y2="303" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="421" y="296" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#16a34a">shared</text>

  <!-- B→A dashed (weak_ptr) -->
  <line x1="444" y1="318" x2="402" y2="318" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowAmber)"/>
  <text x="423" y="332" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#f59e0b">weak</text>

  <!-- Resolved label -->
  <rect x="534" y="294" width="76" height="30" rx="4" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <text x="572" y="308" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="bold" fill="#15803d">已解决 ✓</text>
  <text x="572" y="320" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#166534">可正常析构</text>

  <!-- ---- Bottom legend ---- -->
  <rect x="12" y="340" width="676" height="32" rx="5" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <!-- Legend items -->
  <line x1="24" y1="357" x2="54" y2="357" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <text x="58" y="361" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#3b82f6">unique_ptr（独占）</text>

  <line x1="190" y1="357" x2="220" y2="357" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="224" y="361" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#22c55e">shared_ptr（共享）</text>

  <line x1="356" y1="357" x2="386" y2="357" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowAmber)"/>
  <text x="390" y="361" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#f59e0b">weak_ptr（弱引用，不持有）</text>

  <rect x="576" y="349" width="14" height="14" rx="2" fill="#1e293b"/>
  <text x="594" y="361" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#1e293b">资源对象</text>
</svg>
